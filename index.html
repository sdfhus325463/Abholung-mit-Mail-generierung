<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMICRON Pick-up Service | Professional Portal</title>
    <style>
        :root { --primary: #0056b3; --bg: #f4f7f9; --card: #ffffff; --warn-bg: #fff3cd; --warn-border: #ffeeba; --warn-text: #856404; --success: #28a745; }
        body { font-family: 'Inter', -apple-system, sans-serif; background-color: var(--bg); padding: 20px; color: #333; line-height: 1.5; }
        .container { max-width: 850px; margin: 0 auto; background: var(--card); border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); overflow: hidden; position: relative; min-height: 400px; }
        .header { background: var(--primary); color: white; padding: 25px; text-align: center; }
        .header h2 { margin: 0; font-size: 1.8em; letter-spacing: 1px; font-weight: 700; }
        .form-body { padding: 30px; }
        .section { margin-bottom: 35px; border-left: 4px solid var(--primary); padding-left: 20px; }
        .section-title { font-weight: 700; font-size: 1.1em; margin-bottom: 20px; color: var(--primary); text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .full { grid-column: span 2; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9em; color: #444; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.95em; box-sizing: border-box; font-family: inherit; transition: border 0.2s; }
        
        .count-selector { background: #e7f3ff; padding: 25px; border-radius: 8px; margin-bottom: 25px; border: 2px solid var(--primary); }
        .count-input { font-size: 1.2em; font-weight: bold; color: var(--primary); border: 2px solid var(--primary); width: 100px !important; text-align: center; }
        .package-card { background: #f8f9fa; border: 1px solid #e1e4e8; padding: 20px; border-radius: 8px; margin-bottom: 15px; }
        .dimensions { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; }
        
        button#submitBtn { background: var(--primary); color: white; border: none; padding: 20px; font-size: 1.1em; border-radius: 8px; cursor: pointer; width: 100%; font-weight: 700; margin-top: 20px; transition: 0.3s; }
        button#submitBtn:hover { background: #003d82; }

        #success-overlay { 
            display: none; 
            padding: 60px 30px; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
        }
        .success-icon { font-size: 60px; color: var(--success); margin-bottom: 20px; }
        #success-overlay h1 { color: var(--primary); margin-bottom: 15px; margin-top: 0; }
        #success-overlay p { line-height: 1.6; color: #555; max-width: 500px; margin: 0 auto; }
        .btn-reload { display: inline-block; margin-top: 30px; padding: 15px 30px; background: var(--primary); color: white; text-decoration: none; border-radius: 8px; font-weight: 600; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div id="success-overlay">
        <div class="success-icon">✓</div>
        <h1>Email template created!</h1>
        <p>Your email program has been opened with a pre-filled draft. Please review and send it to finalize your pick-up order.</p>
        <button onclick="location.reload()" class="btn-reload">New Order</button>
    </div>

    <div id="main-content">
        <div class="header">
            <h2>OMICRON Pick-up Service</h2>
        </div>

        <form class="form-body" id="pickupForm">
            <div class="section">
                <div class="section-title">1. Contact</div>
                <div class="grid">
                    <div class="full"><label>Company *</label><input type="text" name="Absender_Firma" required></div>
                    <div><label>Contact Person *</label><input type="text" name="Kontaktperson" required></div>
                    <div><label>Phone number *</label><input type="tel" name="Telefon" required></div>
                    <div class="full"><label>Email *</label><input type="email" name="Absender_Email" required></div>
                    <div><label>City *</label><input type="text" name="Ort" required></div>
                    <div><label>Zip Code *</label><input type="text" name="PLZ" required></div>
                    <div class="full"><label>Street, House No. *</label><input type="text" name="Strasse_Hnr" required></div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">2. Device Info</div>
                <div style="margin-bottom: 20px;">
                    <label>Products & Accessories *</label>
                    <textarea name="Geraete_Liste" rows="3" placeholder="e.g. CMC 500 - Testing Cable" required></textarea>
                </div>

                <div style="margin-bottom: 20px;">
                    <label>Serial Number(s) *</label>
                    <input type="text" name="Seriennummern" placeholder="e.g. 12345678" required>
                </div>
                <div style="margin-bottom: 10px;">
                    <label>Reason for Service *</label>
                    <input type="text" name="Service_Grund" placeholder="e.g. Repair, Calibration, Upgrade" required>
                </div>
            </div>

            <div class="count-selector">
                <label>How many packages in total?</label>
                <input type="number" id="packageCount" name="Anzahl_Packstuecke" value="1" min="1" max="15" class="count-input">
            </div>

            <div class="section">
                <div class="section-title">3. Package Details</div>
                <div id="packageContainer"></div>
            </div>

            <div class="section">
                <div class="section-title">4. Scheduling</div>
                <div class="grid">
                    <div><label>Requested Date for pick-up *</label><input type="date" id="pickupDate" name="Abholdatum" required></div>
                    <div><label>Time Window for pick-up</label><input type="text" name="Zeitfenster" placeholder="e.g. 08:00 - 15:00"></div>
                    <div class="full">
                        <label>Logistics Info (optional)</label>
                        <textarea name="Zusatzinfo_Logistik" rows="2" placeholder="e.g. Loading dock available"></textarea>
                    </div>
                </div>
            </div>

            <button type="submit" id="submitBtn">Generate Email Template</button>
        </form>
    </div>
</div>

<script>
    const container = document.getElementById('packageContainer');
    const selector = document.getElementById('packageCount');
    const pickupForm = document.getElementById('pickupForm');
    const dateInput = document.getElementById('pickupDate');
    const mainContent = document.getElementById('main-content');
    const successOverlay = document.getElementById('success-overlay');

    function setMinDate() {
        const today = new Date().toISOString().split('T')[0];
        dateInput.setAttribute('min', today);
    }

    // Diese Funktion steuert die automatische Befüllung der Maße
    function updateDimensions(selectElement, index) {
        const card = selectElement.closest('.package-card');
        const lInput = card.querySelector(`input[name="P${index}_L"]`);
        const wInput = card.querySelector(`input[name="P${index}_B"]`);
        const hInput = card.querySelector(`input[name="P${index}_H"]`);

        if (selectElement.value === "Euro Palette (120x80)") {
            lInput.value = 120;
            wInput.value = 80;
            hInput.placeholder = "Höhe angeben";
        } else if (selectElement.value === "Kleine Palette (60x80)") {
            lInput.value = 80;
            wInput.value = 60;
            hInput.placeholder = "Höhe angeben";
        } else {
            lInput.value = "";
            wInput.value = "";
            hInput.value = "";
            hInput.placeholder = "";
        }
    }

    function renderPackages() {
        let count = parseInt(selector.value) || 1;
        container.innerHTML = '';
        for (let i = 1; i <= count; i++) {
            const card = document.createElement('div');
            card.className = 'package-card';
            card.innerHTML = `
                <div style="font-weight:bold; margin-bottom:10px; color:#0056b3;">Package #${i}</div>
                <div style="margin-bottom:10px;">
                    <label>Type of Package *</label>
                    <select name="P${i}_Typ" class="package-type-select" data-index="${i}" required>
                        <option value="Paket">Parcel / Box</option>
                        <option value="Original Omicron Koffer">Original Omicron Case</option>
                        <option value="Euro Palette (120x80)">Euro Pallet (120x80)</option>
                        <option value="Kleine Palette (60x80)">Small Pallet (60x80)</option>
                    </select>
                </div>
                <div class="dimensions">
                    <div><label>L (cm)</label><input type="number" name="P${i}_L" required min="1"></div>
                    <div><label>W (cm)</label><input type="number" name="P${i}_B" required min="1"></div>
                    <div><label>H (cm)</label><input type="number" name="P${i}_H" required min="1"></div>
                    <div><label>KG</label><input type="number" name="P${i}_Gewicht" step="0.1" required min="0.1"></div>
                </div>
            `;
            container.appendChild(card);
            
            // Event Listener für das eben erstellte Select-Feld hinzufügen
            card.querySelector('.package-type-select').addEventListener('change', function() {
                updateDimensions(this, i);
            });
        }
    }
    
    selector.addEventListener('input', renderPackages);
    window.addEventListener('DOMContentLoaded', () => {
        renderPackages();
        setMinDate();
    });

    pickupForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const formData = new FormData(pickupForm);
        
        const recipient = "service@omicronenergy.com";
        const subject = `Pick-up Order: ${formData.get('Absender_Firma')} - ${formData.get('Ort')}`;
        
        let body = `1. ABSENDER & KONTAKT\r\n`;
        body += `Company: ${formData.get('Absender_Firma')}\r\n`;
        body += `Contact person: ${formData.get('Kontaktperson')}\r\n`;
        body += `Phone number: ${formData.get('Telefon')}\r\n`;
        body += `Email address: ${formData.get('Absender_Email')}\r\n`;
        body += `Address: ${formData.get('Strasse_Hnr')}, ${formData.get('PLZ')}, ${formData.get('Ort')}\r\n\n`;
        
        body += `2. GERÄTE-INFOS\r\n`;
        body += `Models: ${formData.get('Geraete_Liste')}\r\n`;
        body += `Serial numbers: ${formData.get('Seriennummern')}\r\n`;
        body += `Reason for Service: ${formData.get('Service_Grund')}\r\n\n`;
        
        body += `3. PACKSTÜCKE\r\n`;
        const packCount = formData.get('Anzahl_Packstuecke');
        for(let i = 1; i <= packCount; i++) {
            body += `Package #${i}: ${formData.get('P'+i+'_Typ')} | Dimensions: ${formData.get('P'+i+'_L')}x${formData.get('P'+i+'_B')}x${formData.get('P'+i+'_H')} cm | Weight: ${formData.get('P'+i+'_Gewicht')} kg\r\n`;
        }
        body += `\n`;
        
        body += `4. TERMINIERUNG\r\n`;
        body += `Requested Pick-up date: ${formData.get('Abholdatum')}\r\n`;
        body += `Requested Time window: ${formData.get('Zeitfenster') || 'Keine Angabe'}\r\n`;
        body += `Additional information: ${formData.get('Zusatzinfo_Logistik') || 'keine'}\r\n`;

        const mailtoUrl = `mailto:${recipient}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
        
        window.location.href = mailtoUrl;

        mainContent.style.display = 'none';
        successOverlay.style.display = 'flex';
        window.scrollTo(0, 0);
    });
</script>
</body>
</html>
