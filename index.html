<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMICRON Pick-up Service | Professional Portal</title>
    <style>
        :root { 
            --primary: #0056b3; 
            --bg: #f4f7f9; 
            --card: #ffffff; 
            --success: #28a745; 
            --border: #ddd;
        }
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg); 
            padding: 40px 20px; 
            color: #333; 
            margin: 0;
        }
        .container { 
            max-width: 850px; 
            margin: 0 auto; 
            background: var(--card); 
            border-radius: 8px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
            overflow: hidden; 
        }
        .header { 
            background: var(--primary); 
            color: white; 
            padding: 30px; 
            text-align: center; 
        }
        .header h2 { margin: 0; font-size: 2em; font-weight: 600; }
        .form-body { padding: 40px; }
        
        .section { margin-bottom: 40px; border-left: 5px solid var(--primary); padding-left: 25px; }
        .section-title { 
            font-weight: 800; 
            font-size: 1.2em; 
            margin-bottom: 25px; 
            color: var(--primary); 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .full { grid-column: span 2; }
        
        label { display: block; margin-bottom: 10px; font-weight: 700; font-size: 0.95em; color: #2c3e50; }
        input, select, textarea { 
            width: 100%; 
            padding: 14px; 
            border: 1px solid var(--border); 
            border-radius: 6px; 
            font-size: 1em; 
            box-sizing: border-box; 
            background-color: #fcfcfc;
        }
        input:focus { border-color: var(--primary); outline: none; background-color: #fff; }

        .count-selector { 
            background: #f0f7ff; 
            padding: 30px; 
            border-radius: 8px; 
            margin-bottom: 30px; 
            border: 1px solid #cce3ff; 
        }
        .count-input { 
            font-size: 1.3em; 
            font-weight: bold; 
            color: var(--primary); 
            width: 120px !important; 
            text-align: center; 
            border: 2px solid var(--primary);
        }
        
        .package-card { 
            background: #ffffff; 
            border: 1px solid #e0e0e0; 
            padding: 25px; 
            border-radius: 8px; 
            margin-bottom: 20px; 
        }
        .dimensions { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        
        button#submitBtn { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 22px; 
            font-size: 1.2em; 
            border-radius: 8px; 
            cursor: pointer; 
            width: 100%; 
            font-weight: 700; 
            margin-top: 20px; 
            transition: background 0.2s; 
        }
        button#submitBtn:hover { background: #004494; }

        #success-overlay { 
            display: none; 
            padding: 80px 40px; 
            flex-direction: column; 
            align-items: center; 
            text-align: center; 
        }
        .success-icon { font-size: 80px; color: var(--success); margin-bottom: 25px; }
        .btn-reload { 
            display: inline-block; 
            margin-top: 35px; 
            padding: 18px 35px; 
            background: var(--primary); 
            color: white; 
            text-decoration: none; 
            border-radius: 8px; 
            font-weight: 600; 
            border: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="success-overlay">
        <div class="success-icon">✓</div>
        <h1 style="color: var(--primary);">E-Mail Vorlage erstellt!</h1>
        <p style="font-size: 1.1em; max-width: 600px;">
            Ihr E-Mail-Programm sollte sich soeben mit dem fertigen Entwurf geöffnet haben.<br><br>
            <strong>Wichtig:</strong> Bitte klicken Sie in Ihrem Mail-Programm noch auf "Senden".
        </p>
        <button onclick="location.reload()" class="btn-reload">Neuer Auftrag</button>
    </div>

    <div id="main-content">
        <div class="header">
            <h2>OMICRON Pick-up Service</h2>
        </div>

        <form class="form-body" id="pickupForm">
            <div class="section">
                <div class="section-title">1. Contact</div>
                <div class="grid">
                    <div class="full"><label>Company *</label><input type="text" name="Absender_Firma" required></div>
                    <div><label>Contact Person *</label><input type="text" name="Kontaktperson" required></div>
                    <div><label>Phone number *</label><input type="tel" name="Telefon" required></div>
                    <div class="full"><label>Email *</label><input type="email" name="Absender_Email" required></div>
                    <div><label>City *</label><input type="text" name="Ort" required></div>
                    <div><label>Zip Code *</label><input type="text" name="PLZ" required></div>
                    <div class="full"><label>Street, House No. *</label><input type="text" name="Strasse_Hnr" required></div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">2. Device Info</div>
                <div style="margin-bottom: 25px;">
                    <label>Products & Accessories *</label>
                    <textarea name="Geraete_Liste" rows="3" placeholder="e.g. CMC 500 - Testing Cable" required></textarea>
                </div>
                <div class="grid">
                    <div><label>Serial Number(s) *</label><input type="text" name="Seriennummern" required></div>
                    <div><label>Reason for Service *</label><input type="text" name="Service_Grund" placeholder="e.g. Repair, Calibration" required></div>
                </div>
            </div>

            <div class="count-selector">
                <label>How many packages in total?</label>
                <input type="number" id="packageCount" name="Anzahl_Packstuecke" value="1" min="1" max="15" class="count-input">
            </div>

            <div class="section">
                <div class="section-title">3. Package Details</div>
                <div id="packageContainer"></div>
            </div>

            <div class="section">
                <div class="section-title">4. Scheduling</div>
                <div class="grid">
                    <div><label>Requested Date for pick-up *</label><input type="date" id="pickupDate" name="Abholdatum" required></div>
                    <div><label>Time Window for pick-up</label><input type="text" name="Zeitfenster" placeholder="e.g. 08:00 - 15:00"></div>
                    <div class="full"><label>Logistics Info (optional)</label><textarea name="Zusatzinfo" rows="2" placeholder="e.g. Loading dock available"></textarea></div>
                </div>
            </div>

            <button type="submit" id="submitBtn">Send binding pick-up order</button>
        </form>
    </div>
</div>

<script>
    const container = document.getElementById('packageContainer');
    const selector = document.getElementById('packageCount');
    const pickupForm = document.getElementById('pickupForm');
    const dateInput = document.getElementById('pickupDate');

    // Erstellt die Pakete-Eingabemaske
    function renderPackages() {
        let count = parseInt(selector.value) || 1;
        container.innerHTML = '';
        for (let i = 1; i <= count; i++) {
            const card = document.createElement('div');
            card.className = 'package-card';
            card.innerHTML = `
                <div style="font-weight:bold; margin-bottom:15px; color:#0056b3; border-bottom: 1px solid #eee; padding-bottom:10px;">Package #${i}</div>
                <div style="margin-bottom:20px;">
                    <label>Type of Package *</label>
                    <select name="P${i}_Typ">
                        <option value="Parcel / Box">Parcel / Box</option>
                        <option value="Original Omicron Case">Original Omicron Case</option>
                        <option value="Euro Pallet">Euro Pallet</option>
                    </select>
                </div>
                <div class="dimensions">
                    <div><label>L (cm)</label><input type="number" name="P${i}_L" required></div>
                    <div><label>W (cm)</label><input type="number" name="P${i}_B" required></div>
                    <div><label>H (cm)</label><input type="number" name="P${i}_H" required></div>
                    <div><label>KG</label><input type="number" name="P${i}_Gewicht" step="0.1" required></div>
                </div>`;
            container.appendChild(card);
        }
    }

    selector.addEventListener('input', renderPackages);
    window.addEventListener('DOMContentLoaded', () => {
        renderPackages();
        // Setzt das Mindestdatum für den Picker auf heute
        dateInput.setAttribute('min', new Date().toISOString().split('T')[0]);
    });

    pickupForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const formData = new FormData(pickupForm);
        
        const recipient = "service@omicronenergy.com";
        const subject = `Pick-up Order: ${formData.get('Absender_Firma')} - ${formData.get('Ort')}`;
        
        // E-Mail Text Aufbau
        let body = `1. ABSENDER & KONTAKT\r\n`;
        body += `Firma: ${formData.get('Absender_Firma')}\r\n`;
        body += `Kontaktperson: ${formData.get('Kontaktperson')}\r\n`;
        body += `Telefon: ${formData.get('Telefon')}\r\n`;
        body += `E-Mail: ${formData.get('Absender_Email')}\r\n`;
        body += `Adresse: ${formData.get('Strasse_Hnr')}, ${formData.get('PLZ')}, ${formData.get('Ort')}\r\n\n`;
        
        body += `2. GERÄTE-INFOS\r\n`;
        body += `Modelle: ${formData.get('Geraete_Liste')}\r\n`;
        body += `Seriennummern: ${formData.get('Seriennummern')}\r\n`;
        body += `Servicegrund: ${formData.get('Service_Grund')}\r\n\n`;
        
        body += `3. PACKSTÜCKE\r\n`;
        const packCount = formData.get('Anzahl_Packstuecke');
        for(let i = 1; i <= packCount; i++) {
            body += `Packstück #${i}: ${formData.get('P'+i+'_Typ')} | Maße: ${formData.get('P'+i+'_L')}x${formData.get('P'+i+'_B')}x${formData.get('P'+i+'_H')} cm | Gewicht: ${formData.get('P'+i+'_Gewicht')} kg\r\n`;
        }
        body += `\n`;
        
        body += `4. TERMINIERUNG\r\n`;
        body += `Wunschdatum: ${formData.get('Abholdatum')}\r\n`;
        body += `Zeitfenster: ${formData.get('Zeitfenster') || 'Keine Angabe'}\r\n`;
        body += `Zusatzinfos: ${formData.get('Zusatzinfo') || 'keine'}\r\n`;

        // Mailto generieren
        const mailtoUrl = `mailto:${recipient}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
        
        // Öffnen und Ansicht umschalten
        window.location.href = mailtoUrl;
        document.getElementById('main-content').style.display = 'none';
        document.getElementById('success-overlay').style.display = 'flex';
        window.scrollTo(0,0);
    });
</script>

</body>
</html>
